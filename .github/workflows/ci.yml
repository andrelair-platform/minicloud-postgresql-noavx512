name: Build and Push

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]

env:
  HARBOR_REGISTRY: harbor.10.0.0.200.nip.io
  IMAGE_NAME: library/postgresql-noavx512

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Set image tag
        id: meta
        run: |
          # Tag tracks the upstream postgresql chart version it patches.
          # Bump when upgrading the base Bitnami postgresql image.
          echo "tag=$(grep 'FROM.*postgresql' Dockerfile | head -1 | sed 's/.*://;s/ .*//')-noavx512" >> $GITHUB_OUTPUT

      # ── Tailscale: join the minicloud tailnet so we can reach Harbor ────────
      - name: Connect to Tailscale
        if: github.ref == 'refs/heads/main'
        uses: tailscale/github-action@v4.1.3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          version: latest

      # ── Trust the minicloud self-signed CA so Docker accepts Harbor TLS ────
      - name: Trust minicloud CA
        if: github.ref == 'refs/heads/main'
        run: |
          sudo mkdir -p /etc/docker/certs.d/${{ env.HARBOR_REGISTRY }}
          echo "${{ secrets.MINICLOUD_CA_CERT }}" | sudo tee /etc/docker/certs.d/${{ env.HARBOR_REGISTRY }}/ca.crt
          echo "${{ secrets.MINICLOUD_CA_CERT }}" | sudo tee /usr/local/share/ca-certificates/minicloud-ca.crt
          sudo update-ca-certificates

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor.10.0.0.200.nip.io"]
              insecure = true

      - name: Login to Harbor
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes \
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
